<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb" aria-hidden="true"></div>
  <div class="bg-orb" aria-hidden="true"></div>
  <div class="bg-orb" aria-hidden="true"></div>

  <main class="container" role="main">
    <header class="header">
      <span class="header-icon" aria-hidden="true">⛅</span>
      <h1>Weather Forecast</h1>
      <p class="subtitle">Check the weather in any city worldwide</p>
    </header>

    <form class="search-form" id="weatherForm" role="search" aria-label="Search weather by city">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="text"
        id="cityInput"
        class="search-input"
        placeholder="Enter a city..."
        required
        autocomplete="off"
        aria-label="City name"
      >
      <button type="submit" class="search-btn" aria-label="Search weather">
        Search
      </button>
      <ul id="suggestions" class="suggestions-list" role="listbox" aria-label="City suggestions" hidden></ul>
    </form>

    <button type="button" class="geo-btn" id="geoBtn" aria-label="Detect current location">
      <span aria-hidden="true">📍</span> Use my location
    </button>

    <section id="weatherResult" class="weather-result" aria-live="polite" aria-atomic="true">
    </section>

    <section id="forecastResult" aria-live="polite" aria-label="5-day forecast">
    </section>

    <footer class="footer">
      Data provided by <a href="https://openweathermap.org" target="_blank" rel="noopener noreferrer">OpenWeatherMap</a>
    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
